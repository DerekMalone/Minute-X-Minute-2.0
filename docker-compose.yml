services:
  postgres:
    image: postgres:17-alpine
    container_name: sports-postgres
    environment:
      POSTGRES_DB: sportsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sports-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sports-backend
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sports-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sports-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - sports-network

volumes:
  postgres-data:

networks:
  sports-network:
    driver: bridge
